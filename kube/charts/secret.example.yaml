# This is an example Secret manifest.
#
# Do not commit real Secret manifests to git. Copy this file outside the
# repository before replacing placeholders with real values.
#
# Kubernetes Secret data values are base64 encoded, but base64 is not
# encryption. Protect the real manifest and rotate exposed tokens.
#
# The name of this secret should match the 'secretName' value in values.yaml.
# The default and recommended name for the shared secret is 'streamlink-secrets'.

apiVersion: v1
kind: Secret
metadata:
  # Ensure this name matches the 'secretName' in values.yaml (default: streamlink-secrets)
  name: streamlink-secrets
type: Opaque
data:
  # Required Twitch Developer Portal credentials for Helix live-status polling.
  clientid: <base64_encoded_twitch_client_id>
  clientsecret: <base64_encoded_twitch_client_secret>

  # Optional Twitch browser auth-token cookie for Streamlink playback auth.
  # This is not a Twitch Developer Portal OAuth refresh token.
  # Omit this key when unauthenticated public stream recording is sufficient.
  oauthtoken: <base64_encoded_twitch_browser_auth_token>

  # Optional Slack webhook path/ID.
  # slackid: <base64_encoded_slack_id>

  # Optional Telegram credentials.
  telegrambottoken: <base64_encoded_telegram_bot_token>
  telegramchatid: <base64_encoded_telegram_chat_id>
